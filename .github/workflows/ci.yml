name: ci

# The unit tests (kai test) cover pure parsing and the Tls effect mock,
# but kaikai's test runner installs no Ffi capability, so the real
# OpenSSL path — handshake, cert verification, EINTR retry, send_all's
# partial-write loop — is only exercised by the runnable examples. This
# workflow runs them so those paths cannot regress silently.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL 4 and kaikai
        run: |
          brew update
          brew install openssl@4
          brew tap kaikailang-org/kaikai
          brew install kaikai
          kai --version

      - name: Unit tests (pure parsers + effect mock)
        run: make test

      - name: Live GET over TLS
        run: |
          make example
          ./build/https_get | tee /tmp/get.out
          grep -q "status: 200" /tmp/get.out

      - name: Live POST — the send path over a >16 KB body
        run: |
          make example-post
          ./build/https_post | tee /tmp/post.out
          grep -q "status: 200" /tmp/post.out
          grep -q "body echoed intact: yes" /tmp/post.out

      - name: Concurrent requests — one must not block the other
        run: |
          make example-concurrent
          ./build/https_concurrent | tee /tmp/conc.out
          grep -q "neither blocked the other" /tmp/conc.out

      - name: Keep-alive — many requests over one connection
        timeout-minutes: 1
        run: |
          make example-keepalive
          ./build/https_keepalive | tee /tmp/ka.out
          grep -q "1 connection, 1 handshake" /tmp/ka.out

      - name: TLS server — rongo's server and client, one process (no network)
        timeout-minutes: 1
        run: |
          make certs
          make example-server
          ./build/tls_echo | tee /tmp/echo.out
          grep -q "server saw: hello over tls" /tmp/echo.out
          grep -q "client got: hello over tls" /tmp/echo.out

      - name: Mutual TLS — rongo client cert against rongo server, and reject no-cert
        timeout-minutes: 1
        run: |
          make certs
          make example-mtls
          ./build/mtls | tee /tmp/mtls.out
          grep -q "mtls client got: hello over mtls" /tmp/mtls.out
          grep -q "no-cert client rejected: yes" /tmp/mtls.out

      - name: HTTP server — keep-alive, and a crashing handler is isolated to a 500
        timeout-minutes: 1
        run: |
          make certs
          make example-http-server
          ./build/http_server | tee /tmp/httpsrv.out
          grep -q "normal request:       200" /tmp/httpsrv.out
          grep -q "crashing request:     500" /tmp/httpsrv.out
          grep -q "request after crash:  200" /tmp/httpsrv.out
          grep -q "server stopped cleanly" /tmp/httpsrv.out
